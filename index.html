<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เป็นแฟนกันนะ 🥺</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Kanit',sans-serif;
    background:#d2f1da;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.card{
    width:360px;
    background:#fff;
    border-radius:25px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.12);
    position:relative;
}

h1{
    color:#2c3e50;
    margin-bottom:25px;
}

.btn-area{
    position:relative;
    width:100%;
    height:220px;
}

button{
    border:none;
    border-radius:30px;
    padding:14px 35px;
    font-size:18px;
    font-family:'Kanit',sans-serif;
    cursor:pointer;
    transition:.15s;
}

#btnYes{
    position:absolute;
    left:30px;
    top:90px;
    background:#ff6584;
    color:#fff;
    box-shadow:0 8px 20px rgba(255,101,132,.4);
}

#btnNo{
    position:absolute;
    left:180px;
    top:90px;
    background:#f1f2f6;
    color:#444;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

p{
    margin-top:10px;
    color:#888;
}

#success{
    display:none;
}

.success{
    font-size:60px;
    margin-bottom:15px;
}
</style>
</head>

<body>

<div class="card">

<div id="question">

<h1>เป็นแฟนกับพี่นะ แฮวอน 🥺</h1>

<div class="btn-area">

<button id="btnYes">
เป็น 💖
</button>

<button id="btnNo">
ไม่เป็น 💔
</button>

</div>

<p>ถ้าตกลงจะรักและดูแลอย่างดีเลยนะตัวเธอออ~</p>

</div>

<div id="success">

<div class="success">
🥰🎉
</div>

<h1>เย้! รักที่สุดเลยครับ 💖</h1>

<p>สัญญาว่าจะดูแลเธอให้ดีที่สุด ❤️</p>

</div>

</div>

<script>

const btnNo=document.getElementById("btnNo");
const btnYes=document.getElementById("btnYes");

const question=document.getElementById("question");
const success=document.getElementById("success");

const card=document.querySelector(".card");

// ฟังก์ชันสุ่มตำแหน่งใหม่
function moveButton(){

    const cardRect=card.getBoundingClientRect();
    const btnRect=btnNo.getBoundingClientRect();

    const padding=20;

    const maxX=cardRect.width-btnRect.width-padding;
    const maxY=cardRect.height-btnRect.height-padding;

    const x=Math.random()*maxX;
    const y=Math.random()*(maxY-80)+60;

    btnNo.style.left=x+"px";
    btnNo.style.top=y+"px";
}

// PC
btnNo.addEventListener("mouseenter",moveButton);

// มือถือ
btnNo.addEventListener("touchstart",function(e){
    e.preventDefault();
    moveButton();
},{passive:false});

// รองรับทั้งเมาส์และนิ้ว
btnNo.addEventListener("pointerdown",function(e){
    e.preventDefault();
    moveButton();
});

// เผลอกดทันก็วิ่งหนีอีก
btnNo.addEventListener("click",function(e){
    e.preventDefault();
    moveButton();
});

// กดปุ่มเป็น
btnYes.addEventListener("click",function(){

    question.style.display="none";
    success.style.display="block";

    // ถ้าไม่ต้องการเปิดเมล ให้ลบบรรทัดด้านล่างได้
    window.location.href="mailto:2.3.wachirawit@prathai.ac.th?subject=แฮวอนตอบตกลง&body=แฮวอนตกลงเป็นแฟนแล้ว ❤️";

});

</script>

</body>
</html>
